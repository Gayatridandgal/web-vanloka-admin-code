name: CI

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

jobs:
    validate:
        name: Type Check · Lint · Format · Build · Test
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: |
                  bun install
                  bun add -d @esbuild/linux-x64 @rollup/rollup-linux-x64-gnu @tailwindcss/oxide-linux-x64-gnu

            - name: Type check
              run: bun run type-check

            - name: Lint
              run: bun run lint

            - name: Format check
              run: bun run format:check

            - name: Build
              run: bun run build

            - name: Test
              run: bun run test
